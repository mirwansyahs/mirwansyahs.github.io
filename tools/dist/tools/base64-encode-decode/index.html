cols-2"> <label class="block"> <span class="mb-2 block text-sm font-semibold text-slate-700">Input</span> <textarea id="b64Input" class="h-44 w-full rounded-2xl border border-slate-300 p-3 font-mono text-sm md:h-52 lg:h-[34vh]" placeholder="Type here..."></textarea> </label> <label class="block"> <span class="mb-2 block text-sm font-semibold text-slate-700">Output</span> <textarea id="b64Output" class="h-44 w-full rounded-2xl border border-slate-300 p-3 font-mono text-sm md:h-52 lg:h-[34vh]" readonly></textarea> </label> </div> <div class="mt-3 flex flex-wrap gap-2"> <button id="encodeBtn" class="rounded-xl bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700">Encode</button> <button id="decodeBtn" class="rounded-xl bg-amber-500 px-4 py-2 text-sm font-semibold text-slate-900 hover:bg-amber-400">Decode</button> <button id="copyB64Btn" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">Copy Output</button> </div> <p id="b64Message" class="mt-3 text-sm text-slate-600"></p> </section> <script type="module">const a=document.getElementById("b64Input"),e=document.getElementById("b64Output"),t=document.getElementById("b64Message");document.getElementById("encodeBtn")?.addEventListener("click",()=>{const n=a?.value??"";e.value=btoa(unescape(encodeURIComponent(n))),t.textContent="Text berhasil di-encode ke Base64."});document.getElementById("decodeBtn")?.addEventListener("click",()=>{try{const n=a?.value??"";e.value=decodeURIComponent(escape(atob(n))),t.textContent="Base64 berhasil di-decode."}catch{t.textContent="Format Base64 tidak valid."}});document.getElementById("copyB64Btn")?.addEventListener("click",async()=>{e.value&&(await navigator.clipboard.writeText(e.value),t.textContent="Output tersalin ke clipboard.")});</script>  </section>  </main>  </div> </body></html>
